name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Mac app package
      run: swift build --package-path VideoLibraryMac -v
    - name: Validate bundled web app JavaScript
      run: |
        node -e "const fs=require('fs');const html=fs.readFileSync('VideoLibraryMac/Sources/VideoLibraryApp/Resources/app.html','utf8');const scripts=[...html.matchAll(/<script>([\s\S]*?)<\/script>/g)].map(m=>m[1]);for (const script of scripts) new Function(script); console.log('parsed', scripts.length, 'script block(s)');"
